<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de espaçamento entre barras</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f1f3f2;
    min-height: 100vh;
    padding: 28px 20px;
    color: #1f2937;
    line-height: 1.5;
  }
  .page {
    max-width: 1200px;
    margin: 0 auto;
  }
  .page-header {
    margin-bottom: 22px;
    padding: 0 4px;
  }

  /* Layout principal: cálculos à esquerda, desenho fixo à direita */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 950px) {
    .main-layout {
      grid-template-columns: 1fr;
    }
  }
  .col-left { min-width: 0; }
  .col-right { min-width: 0; }
  .sticky-card {
    position: sticky;
    top: 20px;
  }
  .page-header h1 {
    font-size: 1.6em;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 4px;
  }
  .page-header .subtitle {
    color: #6b7280;
    font-size: 0.92em;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.78em;
    font-weight: 700;
    color: #6b7280;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* GRID DE INPUTS — colunas configuráveis */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 450px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  .field label {
    display: block;
    font-size: 0.88em;
    color: #4b5563;
    margin-bottom: 6px;
  }
  .field label .unit {
    color: #9ca3af;
  }
  .field input,
  .field select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.95em;
    background: #fff;
    color: #1f2937;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .field input:focus,
  .field select:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  /* Caixa de fórmula azul-clara (estilo "Md = ... | Vd = ...") */
  .formula-bar {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 14px;
    color: #1e40af;
    font-size: 0.9em;
  }
  .formula-bar strong { color: #1e3a8a; font-weight: 700; }
  .formula-bar .sep { color: #93c5fd; margin: 0 10px; }

  /* Destaque de resultado — verde (mantido conforme solicitado) */
  .result-box {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: #fff;
    padding: 22px;
    border-radius: 10px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-box.warn { background: linear-gradient(135deg, #e67e22, #f39c12); }
  .result-box.error { background: linear-gradient(135deg, #c0392b, #e74c3c); }
  .result-box .label {
    font-size: 0.78em;
    opacity: 0.95;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .result-box .value {
    font-size: 2.2em;
    font-weight: 700;
    line-height: 1;
  }
  .result-box .value .unit {
    font-size: 0.45em;
    font-weight: 500;
    opacity: 0.9;
    margin-left: 4px;
  }

  /* Memorial — bloco neutro */
  .memo {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-left: 3px solid #2563eb;
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 0.9em;
    line-height: 1.65;
    color: #374151;
  }
  .memo .label {
    font-size: 0.78em;
    font-weight: 700;
    color: #6b7280;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .memo .formula-line {
    background: #fff;
    border: 1px dashed #d1d5db;
    border-radius: 4px;
    padding: 8px 10px;
    margin: 6px 0 10px 0;
    font-family: 'Courier New', monospace;
    font-size: 0.92em;
    color: #1f2937;
  }

  /* Avisos */
  .alert {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-left: 3px solid #f59e0b;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.88em;
    color: #92400e;
    margin-bottom: 12px;
  }
  .alert.danger {
    background: #fef2f2;
    border-color: #fecaca;
    border-left-color: #dc2626;
    color: #991b1b;
  }

  /* Layout lado a lado: resultado/memorial à esquerda, desenho à direita */
  .result-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 750px) {
    .result-layout { grid-template-columns: 1fr; }
  }
  .result-left { min-width: 0; }
  .result-right { min-width: 0; }

  /* Desenho — tamanho original */
  .svg-wrap {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }
  .svg-wrap svg {
    max-width: 100%;
    height: auto;
  }
  .svg-label {
    font-size: 0.78em;
    font-weight: 700;
    color: #6b7280;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Calculadora de espaçamento entre barras</h1>
    <div class="subtitle">Armadura longitudinal de viga · espaçamento livre entre faces das barras</div>
  </div>

  <div class="main-layout">

    <div class="col-left">

      <!-- Dados da viga -->
      <div class="card">
        <div class="card-title">Dados da viga</div>
        <div class="grid-2">
          <div class="field">
            <label>b<sub>w</sub> — largura da viga <span class="unit">(cm)</span></label>
            <input type="number" id="bw" value="19" step="0.5" min="0">
          </div>
          <div class="field">
            <label>c — cobrimento <span class="unit">(cm)</span></label>
            <input type="number" id="cobr" value="3" step="0.1" min="0">
          </div>
        </div>
      </div>

      <!-- Armadura longitudinal -->
      <div class="card">
        <div class="card-title">Armadura longitudinal</div>
        <div class="grid-2">
          <div class="field">
            <label>Ø<sub>L</sub> — bitola da barra <span class="unit">(mm)</span></label>
            <select id="bitolaBarra">
              <option value="5">5,0 mm</option>
              <option value="6.3">6,3 mm</option>
              <option value="8">8,0 mm</option>
              <option value="10" selected>10,0 mm</option>
              <option value="12.5">12,5 mm</option>
              <option value="16">16,0 mm</option>
              <option value="20">20,0 mm</option>
              <option value="25">25,0 mm</option>
              <option value="32">32,0 mm</option>
            </select>
          </div>
          <div class="field">
            <label>n — quantidade de barras <span class="unit">(un)</span></label>
            <input type="number" id="nBarras" value="3" step="1" min="2">
          </div>
        </div>
      </div>

      <!-- Estribo -->
      <div class="card">
        <div class="card-title">Estribo</div>
        <div class="grid-2">
          <div class="field">
            <label>Ø<sub>t</sub> — bitola do estribo <span class="unit">(mm)</span></label>
            <select id="bitolaEstribo">
              <option value="5" selected>5,0 mm</option>
              <option value="6.3">6,3 mm</option>
              <option value="8">8,0 mm</option>
              <option value="10">10,0 mm</option>
              <option value="12.5">12,5 mm</option>
            </select>
          </div>
          <div class="field">
            <label>r — nº de ramos <span class="unit">(un)</span></label>
            <input type="number" id="ramos" value="2" step="1" min="2">
          </div>
        </div>
      </div>

      <!-- Resultado -->
      <div class="card">
        <div class="card-title">Resultado</div>
        <div id="alertBox"></div>
        <div id="resultBox" class="result-box">
          <div class="label">Espaçamento livre entre faces das barras</div>
          <div class="value"><span id="espValor">—</span><span class="unit">cm</span></div>
        </div>

        <div class="memo">
          <div class="label">Memorial do cálculo</div>
          <div class="formula-line" id="formulaTxt">—</div>
          <div id="detalhesTxt"></div>
        </div>
      </div>

    </div>

    <div class="col-right">
      <div class="card sticky-card">
        <div class="card-title">Corte transversal da viga</div>
        <div class="svg-wrap">
          <div id="svgCorte"></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
const ids = ['bw','cobr','bitolaBarra','nBarras','bitolaEstribo','ramos'];
ids.forEach(id => document.getElementById(id).addEventListener('input', calcular));

function fmt(v, casas=2) {
  return v.toLocaleString('pt-BR', {minimumFractionDigits: casas, maximumFractionDigits: casas});
}

function calcular() {
  const bw = parseFloat(document.getElementById('bw').value) || 0;
  const c  = parseFloat(document.getElementById('cobr').value) || 0;
  const phiL_mm = parseFloat(document.getElementById('bitolaBarra').value) || 0;
  const n  = parseInt(document.getElementById('nBarras').value) || 0;
  const phiT_mm = parseFloat(document.getElementById('bitolaEstribo').value) || 0;
  const ramos = Math.max(2, parseInt(document.getElementById('ramos').value) || 2);

  const phiL = phiL_mm / 10;
  const phiT = phiT_mm / 10;

  const alertBox = document.getElementById('alertBox');
  const resultBox = document.getElementById('resultBox');
  const espVal = document.getElementById('espValor');
  const formula = document.getElementById('formulaTxt');
  const detalhes = document.getElementById('detalhesTxt');

  alertBox.innerHTML = '';
  resultBox.className = 'result-box';

  if (n < 2) {
    espVal.textContent = '—';
    formula.textContent = 'Necessário ao menos 2 barras para calcular espaçamento.';
    detalhes.innerHTML = '';
    alertBox.innerHTML = '<div class="alert danger">⚠️ Informe pelo menos 2 barras longitudinais.</div>';
    desenharSVG(bw, c, phiL, n, phiT, 0, ramos);
    return;
  }

  const ramosInternos = ramos - 2;
  const espacoUtil = bw - 2*c - 2*phiT - n*phiL - ramosInternos*phiT;
  const numEspacos = n - 1;
  const espacamento = espacoUtil / numEspacos;

  espVal.textContent = fmt(espacamento);

  if (ramosInternos > 0) {
    formula.innerHTML = `e = (b<sub>w</sub> − 2c − 2·Ø<sub>t</sub> − n·Ø<sub>L</sub> − (r−2)·Ø<sub>t</sub>) / (n − 1)`;
    detalhes.innerHTML = `
      e = (${fmt(bw)} − 2·${fmt(c)} − 2·${fmt(phiT)} − ${n}·${fmt(phiL)} − ${ramosInternos}·${fmt(phiT)}) / (${n} − 1)<br>
      e = (${fmt(bw)} − ${fmt(2*c)} − ${fmt(2*phiT)} − ${fmt(n*phiL)} − ${fmt(ramosInternos*phiT)}) / ${numEspacos}<br>
      e = ${fmt(espacoUtil)} / ${numEspacos} = <strong>${fmt(espacamento)} cm</strong>
    `;
  } else {
    formula.innerHTML = `e = (b<sub>w</sub> − 2c − 2·Ø<sub>t</sub> − n·Ø<sub>L</sub>) / (n − 1)`;
    detalhes.innerHTML = `
      e = (${fmt(bw)} − 2·${fmt(c)} − 2·${fmt(phiT)} − ${n}·${fmt(phiL)}) / (${n} − 1)<br>
      e = (${fmt(bw)} − ${fmt(2*c)} − ${fmt(2*phiT)} − ${fmt(n*phiL)}) / ${numEspacos}<br>
      e = ${fmt(espacoUtil)} / ${numEspacos} = <strong>${fmt(espacamento)} cm</strong>
    `;
  }

  const espMin_mm = Math.max(20, phiL_mm);
  const espMin_cm = espMin_mm / 10;

  if (espacamento < 0) {
    resultBox.className = 'result-box error';
    alertBox.innerHTML = `<div class="alert danger">❌ Não há espaço suficiente! A soma das barras + estribos + cobrimentos excede a largura da viga. Aumente b<sub>w</sub> ou reduza a quantidade/bitola.</div>`;
  } else if (espacamento < espMin_cm) {
    resultBox.className = 'result-box warn';
    alertBox.innerHTML = `<div class="alert">⚠️ Espaçamento abaixo do mínimo recomendado pela NBR 6118 (a<sub>h</sub> ≥ máx{2,0 cm; Ø<sub>L</sub>} = ${fmt(espMin_cm)} cm). Considere redimensionar.</div>`;
  }

  desenharSVG(bw, c, phiL, n, phiT, espacamento, ramos);
}

function desenharSVG(bw, c, phiL, n, phiT, esp, ramos) {
  const h = bw * 1.8;
  const margin = 8;
  const vbW = bw + 2*margin;
  const vbH = h + 2*margin + 6;
  const scale = 14;
  const W = vbW * scale;
  const H = vbH * scale;

  const X = (x) => (x + margin) * scale;
  const Y = (y) => (y + margin) * scale;

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fff;">`;

  // Contorno da viga
  const concretoLW = 6;
  svg += `<path d="M ${X(0)} ${Y(0)} L ${X(0)} ${Y(h)} L ${X(bw)} ${Y(h)} L ${X(bw)} ${Y(0)}"
          stroke="#1a1a1a" stroke-width="${concretoLW}" fill="none" stroke-linecap="square"/>`;
  svg += `<line x1="${X(0)}" y1="${Y(0)}" x2="${X(bw)}" y2="${Y(0)}"
          stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,4"/>`;

  // Estribo retangular externo (azul)
  const estX1 = c + phiT/2;
  const estX2 = bw - c - phiT/2;
  const estY1 = c + phiT/2;
  const estY2 = h - c - phiT/2;

  svg += `<path d="M ${X(estX1)} ${Y(estY1)} L ${X(estX1)} ${Y(estY2)} L ${X(estX2)} ${Y(estY2)} L ${X(estX2)} ${Y(estY1)} L ${X(estX1)} ${Y(estY1)}"
          stroke="#2980b9" stroke-width="${phiT*scale}" fill="none" stroke-linejoin="miter" stroke-linecap="butt" opacity="0.9"/>`;

  // Posicionamento das barras
  const yBar = h - c - phiT - phiL/2;
  const x0 = c + phiT + phiL/2;
  const passo = phiL + (esp > 0 ? esp : 0);

  const xBars = [];
  for (let i = 0; i < n; i++) xBars.push(x0 + i*passo);

  // RAMOS INTERNOS — pernas verticais azuis
  const ramosInternos = ramos - 2;
  const xRamosInternos = [];
  if (ramosInternos > 0) {
    const barrasInternas = [];
    for (let i = 1; i < n - 1; i++) barrasInternas.push(xBars[i]);

    if (ramosInternos === 1) {
      if (n % 2 === 1) {
        xRamosInternos.push(xBars[(n-1)/2]);
      } else {
        xRamosInternos.push((xBars[n/2 - 1] + xBars[n/2]) / 2);
      }
    } else if (barrasInternas.length >= ramosInternos) {
      const step = (barrasInternas.length - 1) / (ramosInternos - 1);
      for (let i = 0; i < ramosInternos; i++) {
        const idx = Math.round(i * step);
        xRamosInternos.push(barrasInternas[idx]);
      }
    } else {
      for (let i = 1; i <= ramosInternos; i++) {
        const frac = i / (ramosInternos + 1);
        xRamosInternos.push(xBars[0] + frac * (xBars[n-1] - xBars[0]));
      }
    }
  }

  const yTopoInterno = estY1;
  const yBaseInterno = estY2;
  xRamosInternos.forEach(xR => {
    svg += `<line x1="${X(xR)}" y1="${Y(yTopoInterno)}" x2="${X(xR)}" y2="${Y(yBaseInterno)}"
            stroke="#2980b9" stroke-width="${phiT*scale}" opacity="0.9" stroke-linecap="butt"/>`;
    svg += `<line x1="${X(xR)}" y1="${Y(yTopoInterno)}" x2="${X(xR - 0.7)}" y2="${Y(yTopoInterno + 0.5)}"
            stroke="#2980b9" stroke-width="${phiT*scale*0.9}" opacity="0.9" stroke-linecap="round"/>`;
  });

  // Barras longitudinais (vermelhas)
  const rBar = (phiL/2) * scale;
  xBars.forEach(xi => {
    svg += `<circle cx="${X(xi)}" cy="${Y(yBar)}" r="${rBar}" fill="#fff" stroke="#c0392b" stroke-width="2.5"/>`;
    svg += `<circle cx="${X(xi)}" cy="${Y(yBar)}" r="${Math.max(rBar*0.35,1.5)}" fill="#c0392b"/>`;
  });

  // COTAS ENTRE FACES DAS BARRAS
  if (esp > 0 && n >= 2) {
    const cotaY = h + 1.2;
    const tickH = 0.5;
    for (let i = 0; i < n - 1; i++) {
      const xa = xBars[i] + phiL/2;
      const xb = xBars[i+1] - phiL/2;
      svg += `<line x1="${X(xa)}" y1="${Y(yBar)}" x2="${X(xa)}" y2="${Y(cotaY+tickH)}" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>`;
      svg += `<line x1="${X(xb)}" y1="${Y(yBar)}" x2="${X(xb)}" y2="${Y(cotaY+tickH)}" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>`;
      svg += `<line x1="${X(xa)}" y1="${Y(cotaY)}" x2="${X(xb)}" y2="${Y(cotaY)}" stroke="#27ae60" stroke-width="1.5"/>`;
      svg += `<polygon points="${X(xa)},${Y(cotaY)} ${X(xa)+6},${Y(cotaY)-4} ${X(xa)+6},${Y(cotaY)+4}" fill="#27ae60"/>`;
      svg += `<polygon points="${X(xb)},${Y(cotaY)} ${X(xb)-6},${Y(cotaY)-4} ${X(xb)-6},${Y(cotaY)+4}" fill="#27ae60"/>`;
      const xm = (xa + xb)/2;
      svg += `<text x="${X(xm)}" y="${Y(cotaY)+18}" text-anchor="middle" font-family="Arial" font-size="13" fill="#1e8449" font-weight="600">${esp.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2})}</text>`;
    }
  }

  // Cota da largura total
  const cotaYtop = -2;
  svg += `<line x1="${X(0)}" y1="${Y(cotaYtop)}" x2="${X(bw)}" y2="${Y(cotaYtop)}" stroke="#555" stroke-width="1.2"/>`;
  svg += `<line x1="${X(0)}" y1="${Y(cotaYtop-0.6)}" x2="${X(0)}" y2="${Y(cotaYtop+0.6)}" stroke="#555" stroke-width="1.2"/>`;
  svg += `<line x1="${X(bw)}" y1="${Y(cotaYtop-0.6)}" x2="${X(bw)}" y2="${Y(cotaYtop+0.6)}" stroke="#555" stroke-width="1.2"/>`;
  svg += `<text x="${X(bw/2)}" y="${Y(cotaYtop)-6}" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="600">b = ${bw.toLocaleString('pt-BR')} cm</text>`;

  // Cota do cobrimento
  if (c > 0) {
    const cy = h - c/2;
    svg += `<text x="${X(c/2)}" y="${Y(cy)+4}" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d" transform="rotate(-90 ${X(c/2)} ${Y(cy)+4})">c=${c}</text>`;
  }

  // Legenda
  svg += `<g font-family="Arial" font-size="11" fill="#333">
    <circle cx="${X(0)+10}" cy="${H-50}" r="5" fill="#fff" stroke="#c0392b" stroke-width="2"/>
    <text x="${X(0)+22}" y="${H-46}">Barras Ø${(phiL*10).toLocaleString('pt-BR')} mm (${n} un)</text>
    <rect x="${X(0)+4}" y="${H-32}" width="12" height="3" fill="#2980b9"/>
    <text x="${X(0)+22}" y="${H-28}">Estribo Ø${(phiT*10).toLocaleString('pt-BR')} mm — ${ramos} ramos</text>
  </g>`;

  svg += `</svg>`;

  document.getElementById('svgCorte').innerHTML = svg;
}

calcular();
</script>
</body>
</html>
